<div
  class="relative border-2 border-dashed border-cream-dark dark:border-forest-light/40 rounded-2xl
         overflow-hidden bg-white dark:bg-forest/30 aspect-[4/3] cursor-pointer
         active:scale-[0.98] transition-all duration-200 hover:border-primary/50 hover:bg-primary/5"
  (click)="triggerFileInput()"
>
  @if (preview()) {
    <img [src]="preview()" alt="Preview" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
    <button
      type="button"
      class="absolute top-2.5 right-2.5 w-8 h-8 rounded-full bg-black/60 backdrop-blur-sm
             flex items-center justify-center active:scale-90 transition-transform"
      (click)="removeImage($event)"
    >
      <ion-icon name="close-circle" class="text-white text-xl"></ion-icon>
    </button>
    <div class="absolute bottom-2.5 left-3 flex items-center gap-1.5">
      <div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
      <span class="text-white text-xs font-medium">Photo selected</span>
    </div>
  } @else {
    <div class="flex flex-col items-center justify-center h-full gap-3 px-4">
      <div class="w-14 h-14 rounded-2xl bg-primary/10 flex items-center justify-center">
        <ion-icon name="cloud-upload-outline" class="text-primary text-2xl"></ion-icon>
      </div>
      <div class="text-center">
        <p class="text-sm font-semibold text-[#1A1A1A] dark:text-cream">
          {{ label }}
          @if (required) {
            <span class="text-red-500 ml-0.5">*</span>
          }
        </p>
        <p class="text-xs text-[#8A8A8A] dark:text-cream/40 mt-0.5">{{ hint }}</p>
      </div>
    </div>
  }
</div>

<input
  #fileInput
  type="file"
  class="hidden"
  accept="image/jpeg,image/png,image/webp"
  (change)="onFileChange($event)"
/>
