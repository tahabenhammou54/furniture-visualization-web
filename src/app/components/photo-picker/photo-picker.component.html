<!-- ── Preview (single mode only, when image is selected) ─────────────────── -->
@if (!multiple && preview()) {
  <div
    class="relative border-2 border-primary/30 rounded-2xl overflow-hidden
           bg-white dark:bg-forest/30 aspect-[4/3] cursor-pointer"
    (click)="openModal()"
  >
    <img [src]="preview()" alt="Preview" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
    <button
      type="button"
      class="absolute top-2.5 right-2.5 w-8 h-8 rounded-full bg-black/60 backdrop-blur-sm
             flex items-center justify-center active:scale-90 transition-transform"
      (click)="removeImage($event)"
    >
      <ion-icon name="close-circle" class="text-white text-xl"></ion-icon>
    </button>
    <div class="absolute bottom-2.5 left-3 flex items-center gap-1.5">
      <div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
      <span class="text-white text-xs font-medium">Photo selected</span>
    </div>
  </div>
}

<!-- ── Trigger button (no preview or multiple mode) ────────────────────────── -->
@if (multiple || !preview()) {
  <button
    type="button"
    class="add-photo-btn"
    (click)="openModal()"
  >
    <div class="add-photo-icon-wrap">
      <ion-icon name="add-outline" class="text-2xl text-primary"></ion-icon>
    </div>
    <span class="add-photo-label">
      {{ label }}
      @if (required) {
        <span class="text-red-500 ml-0.5">*</span>
      }
    </span>
  </button>
}

<!-- ── Hidden file inputs ─────────────────────────────────────────────────── -->
<input
  #cameraInput
  type="file"
  accept="image/*"
  capture="environment"
  class="hidden"
  (change)="onFileChange($event)"
/>
<input
  #galleryInput
  type="file"
  accept="image/*"
  [attr.multiple]="multiple ? true : null"
  class="hidden"
  (change)="onFileChange($event)"
/>

<!-- ── Bottom sheet modal ─────────────────────────────────────────────────── -->
@if (isOpen()) {
  <!-- Backdrop -->
  <div class="picker-backdrop" (click)="closeModal()"></div>

  <!-- Panel -->
  <div class="picker-panel">
    <!-- Handle bar -->
    <div class="picker-handle-bar"></div>

    <!-- Header -->
    <div class="picker-header">
      <span class="picker-header-title">Add a photo</span>
      <button type="button" class="picker-close-btn" (click)="closeModal()">
        <ion-icon name="close-outline" class="text-xl"></ion-icon>
      </button>
    </div>

    <!-- Recent photos -->
    @if (recentPhotos().length > 0) {
      <div class="picker-section">
        <div class="picker-section-label">
          <ion-icon name="time-outline" class="text-sm"></ion-icon>
          <span>Recent</span>
        </div>
        <div class="picker-recents-grid">
          @for (photo of recentPhotos(); track photo) {
            <button type="button" class="recent-thumb-btn" (click)="selectRecent(photo)">
              <img [src]="photo" alt="Recent photo" class="recent-thumb-img" />
            </button>
          }
        </div>
      </div>
    }

    <!-- Action buttons -->
    <div class="picker-actions">
      @if (!isWeb) {
        <button type="button" class="picker-action-btn" (click)="openCamera()">
          <div class="picker-action-icon-wrap">
            <ion-icon name="camera-outline" class="text-2xl"></ion-icon>
          </div>
          <span class="picker-action-label">Camera</span>
        </button>
      }

      <button type="button" class="picker-action-btn" (click)="openGallery()">
        <div class="picker-action-icon-wrap">
          <ion-icon name="images-outline" class="text-2xl"></ion-icon>
        </div>
        <span class="picker-action-label">Gallery</span>
      </button>
    </div>
  </div>
}
