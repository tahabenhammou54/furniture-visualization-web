@if (type === 'history-grid' || type === 'card') {
  <div class="grid grid-cols-2 gap-3">
    @for (item of items; track item) {
      <div class="rounded-2xl overflow-hidden">
        <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 aspect-square rounded-2xl"></div>
        <div class="mt-2 space-y-1.5 px-0.5">
          <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 h-3 rounded-full w-3/4"></div>
          <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 h-2.5 rounded-full w-1/2"></div>
        </div>
      </div>
    }
  </div>
}

@if (type === 'list') {
  <div class="flex flex-col gap-3">
    @for (item of items; track item) {
      <div class="flex items-center gap-3 p-4 rounded-2xl bg-white dark:bg-zinc-900">
        <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 w-14 h-14 rounded-xl shrink-0"></div>
        <div class="flex-1 space-y-2">
          <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 h-3.5 rounded-full w-3/4"></div>
          <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 h-3 rounded-full w-1/2"></div>
        </div>
      </div>
    }
  </div>
}

@if (type === 'avatar') {
  <div class="flex flex-col items-center gap-4">
    @for (item of items; track item) {
      <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 w-24 h-24 rounded-full"></div>
      <div class="space-y-2 w-full max-w-xs text-center">
        <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 h-4 rounded-full w-2/3 mx-auto"></div>
        <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 h-3 rounded-full w-1/2 mx-auto"></div>
      </div>
    }
  </div>
}

@if (type === 'text') {
  <div class="space-y-2">
    @for (item of items; track item) {
      <div class="animate-pulse bg-zinc-200 dark:bg-zinc-700 h-3.5 rounded-full"
           [style.width]="item % 3 === 0 ? '60%' : item % 2 === 0 ? '80%' : '100%'"></div>
    }
  </div>
}
