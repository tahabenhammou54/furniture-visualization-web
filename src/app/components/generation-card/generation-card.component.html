<div
  class="rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-all duration-150
         bg-white dark:bg-forest/30 shadow-sm hover:shadow-md"
  (click)="cardClick.emit(item)"
>
  <div class="relative aspect-square">
    <img
      [src]="item.outputImageUrl"
      [alt]="item.prompt || 'Generated room'"
      class="w-full h-full object-cover"
      loading="lazy"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>

    @if (item.status === 'processing' || item.status === 'pending') {
      <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
        <div class="w-8 h-8 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
      </div>
    }

  </div>

  <div class="px-2.5 py-2 flex items-center justify-between">
    <span class="text-[#8A8A8A] dark:text-cream/40 text-[11px]">
      {{ formatDate(item.created_at) }}
    </span>
    @if (item.status === 'completed') {
      <div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
    }
    @if (item.status === 'failed') {
      <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
    }
  </div>
</div>
