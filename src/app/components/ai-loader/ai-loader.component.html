@if (isLoading()) {
  @if (!inline()) {

    <!-- Overlay mode -->
    <div class="loader-backdrop">
      <div class="loader-card">

        <div class="pixel-grid">
          @for (p of pixels; track $index) {
            <div [class]="'pixel pixel--' + p.colorClass"
                 [style.animation-delay]="p.delay + 'ms'"></div>
          }
        </div>

        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>

      </div>
    </div>

  } @else {

    <!-- Inline mode -->
    <div class="loader-inline">

      <div class="pixel-grid pixel-grid--sm">
        @for (p of pixels; track $index) {
          <div [class]="'pixel pixel--' + p.colorClass"
               [style.animation-delay]="p.delay + 'ms'"></div>
        }
      </div>

      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>

    </div>

  }
}
